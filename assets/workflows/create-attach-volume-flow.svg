<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 970" font-family="Consolas, 'SFMono-Regular', Menlo, monospace">
  <defs>
    <marker id="arH" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6480"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="1558" height="968" rx="14" fill="#f3f5fb" stroke="#d7dbec" stroke-width="1.5"/>

  <!-- lifelines -->
  <g stroke="#c3c9e0" stroke-width="1.3" stroke-dasharray="4 4">
    <line x1="90" y1="82" x2="90" y2="868"/>
    <line x1="280" y1="82" x2="280" y2="868"/>
    <line x1="470" y1="82" x2="470" y2="868"/>
    <line x1="660" y1="82" x2="660" y2="868"/>
    <line x1="850" y1="82" x2="850" y2="868"/>
    <line x1="1040" y1="82" x2="1040" y2="868"/>
    <line x1="1230" y1="82" x2="1230" y2="868"/>
    <line x1="1420" y1="82" x2="1420" y2="868"/>
  </g>

  <!-- lane headers -->
  <g text-anchor="middle">
    <g><rect x="15" y="30" width="150" height="50" rx="8" fill="#eceff8" stroke="#374066" stroke-width="1.4"/>
      <text x="90" y="52" font-size="13" font-weight="700" fill="#1a2138">Client</text>
      <text x="90" y="68" font-size="10" fill="#5b6480">CLI / SDK / Horizon</text></g>
    <g><rect x="205" y="30" width="150" height="50" rx="8" fill="#eef1fc" stroke="#3552c6" stroke-width="1.4"/>
      <text x="280" y="55" font-size="13" font-weight="700" fill="#1a2138">Keystone</text></g>
    <g><rect x="395" y="30" width="150" height="50" rx="8" fill="#eef1fc" stroke="#3552c6" stroke-width="1.4"/>
      <text x="470" y="52" font-size="13" font-weight="700" fill="#1a2138">Cinder API</text>
      <text x="470" y="68" font-size="10" fill="#5b6480">Block Storage</text></g>
    <g><rect x="585" y="30" width="150" height="50" rx="8" fill="#eef1fc" stroke="#3552c6" stroke-width="1.4"/>
      <text x="660" y="52" font-size="13" font-weight="700" fill="#1a2138">Cinder</text>
      <text x="660" y="68" font-size="10" fill="#5b6480">Scheduler</text></g>
    <g><rect x="775" y="30" width="150" height="50" rx="8" fill="#e9f7f3" stroke="#0f7a63" stroke-width="1.4"/>
      <text x="850" y="52" font-size="13" font-weight="700" fill="#1a2138">Cinder Volume</text>
      <text x="850" y="68" font-size="10" fill="#5b6480">LVM backend</text></g>
    <g><rect x="965" y="30" width="150" height="50" rx="8" fill="#fbf1e2" stroke="#b5710d" stroke-width="1.4"/>
      <text x="1040" y="52" font-size="13" font-weight="700" fill="#1a2138">MariaDB</text>
      <text x="1040" y="68" font-size="10" fill="#5b6480">volumes table</text></g>
    <g><rect x="1155" y="30" width="150" height="50" rx="8" fill="#eef1fc" stroke="#3552c6" stroke-width="1.4"/>
      <text x="1230" y="52" font-size="13" font-weight="700" fill="#1a2138">Nova API</text></g>
    <g><rect x="1345" y="30" width="150" height="50" rx="8" fill="#e9f7f3" stroke="#0f7a63" stroke-width="1.4"/>
      <text x="1420" y="52" font-size="13" font-weight="700" fill="#1a2138">Nova Compute</text>
      <text x="1420" y="68" font-size="10" fill="#5b6480">+ libvirt / os-brick</text></g>
  </g>

  <!-- step labels -->
  <g font-size="11.3" fill="#5b6480" paint-order="stroke" stroke="#f3f5fb" stroke-width="5" stroke-linejoin="round">
    <text x="185" y="103" text-anchor="middle">request token</text>
    <text x="185" y="148" text-anchor="middle">scoped token</text>
    <text x="375" y="193" text-anchor="middle">POST /volumes</text>
    <text x="755" y="238" text-anchor="middle">INSERT volume (creating)</text>
    <text x="565" y="283" text-anchor="middle">RPC select_destinations</text>
    <text x="755" y="328" text-anchor="middle">RPC create_volume</text>
    <text x="850" y="365" text-anchor="middle">lvcreate in VG cinder-volumes</text>
    <text x="945" y="443" text-anchor="middle">UPDATE status=available</text>
    <text x="1060" y="488" text-anchor="middle">add volume (attach request)</text>
    <text x="850" y="533" text-anchor="middle">reserve + initialize_connection</text>
    <text x="660" y="578" text-anchor="middle">RPC create export / IQN</text>
    <text x="850" y="623" text-anchor="middle">connection info (IQN/target/LUN)</text>
    <text x="1325" y="668" text-anchor="middle">RPC attach_volume</text>
    <text x="1420" y="737" text-anchor="middle">iSCSI login (os-brick) -&gt; /dev/sdX;</text>
    <text x="1420" y="751" text-anchor="middle">libvirt attach -&gt; /dev/vdX</text>
    <text x="945" y="783" text-anchor="middle">attachment complete</text>
    <text x="755" y="828" text-anchor="middle">UPDATE status=in-use</text>
  </g>

  <!-- connectors -->
  <g fill="none" stroke="#5b6480" stroke-width="2.2">
    <path d="M90,110 L277,110" marker-end="url(#arH)"/>
    <path d="M280,155 L93,155" marker-end="url(#arH)"/>
    <path d="M90,200 L467,200" marker-end="url(#arH)"/>
    <path d="M470,245 L1037,245" stroke-dasharray="10 4 2 4" marker-end="url(#arH)"/>
    <path d="M470,290 L657,290" stroke-dasharray="9 6" marker-end="url(#arH)"/>
    <path d="M660,335 L847,335" stroke-dasharray="9 6" marker-end="url(#arH)"/>
    <path d="M850,382 C900,382 900,410 850,410" marker-end="url(#arH)"/>
    <path d="M850,450 L1037,450" stroke-dasharray="10 4 2 4" marker-end="url(#arH)"/>
    <path d="M90,495 L1227,495" marker-end="url(#arH)"/>
    <path d="M1230,540 L473,540" marker-end="url(#arH)"/>
    <path d="M470,585 L847,585" stroke-dasharray="9 6" marker-end="url(#arH)"/>
    <path d="M470,630 L1227,630" marker-end="url(#arH)"/>
    <path d="M1230,675 L1423,675" stroke-dasharray="9 6" marker-end="url(#arH)"/>
    <path d="M1420,722 C1470,722 1470,752 1420,752" marker-end="url(#arH)"/>
    <path d="M1420,790 L473,790" marker-end="url(#arH)"/>
    <path d="M470,835 L1037,835" stroke-dasharray="10 4 2 4" marker-end="url(#arH)"/>
  </g>

  <!-- step numbers -->
  <g font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">
    <g><circle cx="30" cy="110" r="13" fill="#3552c6"/><text x="30" y="114">1</text></g>
    <g><circle cx="30" cy="155" r="13" fill="#3552c6"/><text x="30" y="159">2</text></g>
    <g><circle cx="30" cy="200" r="13" fill="#3552c6"/><text x="30" y="204">3</text></g>
    <g><circle cx="30" cy="245" r="13" fill="#b5710d"/><text x="30" y="249">4</text></g>
    <g><circle cx="30" cy="290" r="13" fill="#3552c6"/><text x="30" y="294">5</text></g>
    <g><circle cx="30" cy="335" r="13" fill="#3552c6"/><text x="30" y="339">6</text></g>
    <g><circle cx="30" cy="382" r="13" fill="#0f7a63"/><text x="30" y="386">7</text></g>
    <g><circle cx="30" cy="450" r="13" fill="#b5710d"/><text x="30" y="454">8</text></g>
    <g><circle cx="30" cy="495" r="13" fill="#3552c6"/><text x="30" y="499">9</text></g>
    <g><circle cx="30" cy="540" r="13" fill="#3552c6"/><text x="30" y="544">10</text></g>
    <g><circle cx="30" cy="585" r="13" fill="#3552c6"/><text x="30" y="589">11</text></g>
    <g><circle cx="30" cy="630" r="13" fill="#3552c6"/><text x="30" y="634">12</text></g>
    <g><circle cx="30" cy="675" r="13" fill="#3552c6"/><text x="30" y="679">13</text></g>
    <g><circle cx="30" cy="722" r="13" fill="#0f7a63"/><text x="30" y="726">14</text></g>
    <g><circle cx="30" cy="790" r="13" fill="#3552c6"/><text x="30" y="794">15</text></g>
    <g><circle cx="30" cy="835" r="13" fill="#b5710d"/><text x="30" y="839">16</text></g>
  </g>

  <!-- legend -->
  <g font-size="11.5" fill="#5b6480">
    <line x1="60" y1="905" x2="100" y2="905" stroke="#5b6480" stroke-width="2.2"/>
    <text x="108" y="909">sync REST / API</text>
    <line x1="280" y1="905" x2="320" y2="905" stroke="#5b6480" stroke-width="2.2" stroke-dasharray="9 6"/>
    <text x="328" y="909">async RPC (RabbitMQ)</text>
    <line x1="560" y1="905" x2="600" y2="905" stroke="#5b6480" stroke-width="2.2" stroke-dasharray="10 4 2 4"/>
    <text x="608" y="909">MariaDB read/write</text>
    <text x="820" y="909">Solid arrows without dash = direct host-local / synchronous action</text>
  </g>
</svg>
