    <path d="M410,310 L582,310" marker-end="url(#arH)"/>
    <path d="M585,360 L932,360" stroke-dasharray="10 4 2 4" marker-end="url(#arH)"/>
    <path d="M410,410 L63,410" marker-end="url(#arH)"/>
    <path d="M585,460 L757,460" stroke-dasharray="9 6" marker-end="url(#arH)"/>
    <path d="M760,510 L588,510" stroke-dasharray="9 6" marker-end="url(#arH)"/>
    <path d="M585,560 L1632,560" stroke-dasharray="9 6" marker-end="url(#arH)"/>
    <path d="M1635,610 L1113,610" marker-end="url(#arH)"/>
    <path d="M1635,660 L1288,660" marker-end="url(#arH)"/>
