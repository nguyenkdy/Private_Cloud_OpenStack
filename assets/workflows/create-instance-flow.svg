      <text x="235" y="55" font-size="13" font-weight="700" fill="#1a2138">Keystone</text>
      <text x="235" y="71" font-size="10" fill="#5b6480">Identity</text>
    </g>
    <g>
      <rect x="335" y="30" width="150" height="50" rx="8" fill="#eef1fc" stroke="#3552c6" stroke-width="1.4"/>
      <text x="410" y="52" font-size="13" font-weight="700" fill="#1a2138">Nova API</text>
      <text x="410" y="68" font-size="10" fill="#5b6480">Compute</text>
    </g>
    <g>
