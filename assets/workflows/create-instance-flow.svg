  <text x="1428" y="683" font-size="11" font-weight="700" fill="#b5710d">opt: boot-from-volume</text>

  <rect x="20" y="908" width="430" height="82" fill="none" stroke="#3552c6" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="28" y="901" font-size="11" font-weight="700" fill="#3552c6">loop: poll until ACTIVE</text>

  <!-- ===== lifelines ===== -->
  <g stroke="#c3c9e0" stroke-width="1.3" stroke-dasharray="4 4">
    <line x1="60" y1="82" x2="60" y2="1010"/>
    <line x1="235" y1="82" x2="235" y2="1010"/>
    <line x1="410" y1="82" x2="410" y2="1010"/>
    <line x1="585" y1="82" x2="585" y2="1010"/>
    <line x1="760" y1="82" x2="760" y2="1010"/>
