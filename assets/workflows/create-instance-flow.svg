    <path d="M585,880 L932,880" stroke-dasharray="10 4 2 4" marker-end="url(#arH)"/>
    <path d="M60,930 L407,930" marker-end="url(#arH)"/>
    <path d="M410,970 L63,970" marker-end="url(#arH)"/>
