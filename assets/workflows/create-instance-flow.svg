  <!-- ===== steps ===== -->
  <g font-size="11.5" fill="#5b6480" paint-order="stroke" stroke="#f3f5fb" stroke-width="5" stroke-linejoin="round">
    <text x="147" y="103" text-anchor="middle">request token</text>
    <text x="147" y="153" text-anchor="middle">scoped token</text>
    <text x="235" y="203" text-anchor="middle">POST /servers</text>
    <text x="322" y="253" text-anchor="middle">validate token</text>
    <text x="497" y="303" text-anchor="middle">instance_create</text>
    <text x="760" y="353" text-anchor="middle">INSERT (BUILDING)</text>
    <text x="235" y="403" text-anchor="middle">202 Accepted</text>
    <text x="672" y="453" text-anchor="middle">select_destinations</text>
    <text x="672" y="503" text-anchor="middle">chosen host</text>
    <text x="1110" y="553" text-anchor="middle">build_and_run_instance</text>
    <text x="1372" y="603" text-anchor="middle">GET image</text>
    <text x="1460" y="653" text-anchor="middle">allocate port / IP</text>
    <text x="1547" y="705" text-anchor="middle">create/attach volume</text>
    <text x="1635" y="782" text-anchor="middle">define &amp; start domain</text>
    <text x="1110" y="823" text-anchor="middle">update instance state</text>
    <text x="760" y="873" text-anchor="middle">UPDATE (ACTIVE)</text>
    <text x="322" y="923" text-anchor="middle">GET status (poll)</text>
    <text x="235" y="963" text-anchor="middle">200 OK · ACTIVE</text>
  </g>

