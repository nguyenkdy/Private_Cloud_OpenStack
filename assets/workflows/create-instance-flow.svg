<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 1080" font-family="Consolas, 'SFMono-Regular', Menlo, monospace">
  <defs>
    <marker id="arH" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6480"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1698" height="1078" rx="14" fill="#f3f5fb" stroke="#d7dbec" stroke-width="1.5"/>

  <!-- ===== fragment frames (drawn first, under lifelines) ===== -->
