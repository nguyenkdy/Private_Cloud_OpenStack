<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 760" font-family="Consolas, 'SFMono-Regular', Menlo, monospace">
  <defs>
    <marker id="arH" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6480"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="1158" height="758" rx="14" fill="#f3f5fb" stroke="#d7dbec" stroke-width="1.5"/>

  <g stroke="#c3c9e0" stroke-width="1.3" stroke-dasharray="4 4">
    <line x1="100" y1="82" x2="100" y2="660"/>
    <line x1="330" y1="82" x2="330" y2="660"/>
    <line x1="560" y1="82" x2="560" y2="660"/>
    <line x1="790" y1="82" x2="790" y2="660"/>
    <line x1="1020" y1="82" x2="1020" y2="660"/>
  </g>

  <g text-anchor="middle">
    <g><rect x="25" y="30" width="150" height="50" rx="8" fill="#eceff8" stroke="#374066" stroke-width="1.4"/>
      <text x="100" y="52" font-size="13" font-weight="700" fill="#1a2138">Client</text>
      <text x="100" y="68" font-size="10" fill="#5b6480">CLI / SDK / Horizon</text></g>
    <g><rect x="255" y="30" width="150" height="50" rx="8" fill="#eef1fc" stroke="#3552c6" stroke-width="1.4"/>
      <text x="330" y="55" font-size="13" font-weight="700" fill="#1a2138">Keystone</text></g>
    <g><rect x="485" y="30" width="150" height="50" rx="8" fill="#eef1fc" stroke="#3552c6" stroke-width="1.4"/>
      <text x="560" y="52" font-size="13" font-weight="700" fill="#1a2138">Swift Proxy</text>
      <text x="560" y="68" font-size="10" fill="#5b6480">entry point</text></g>
    <g><rect x="715" y="30" width="150" height="50" rx="8" fill="#e9f7f3" stroke="#0f7a63" stroke-width="1.4"/>
      <text x="790" y="52" font-size="13" font-weight="700" fill="#1a2138">Object Servers</text>
      <text x="790" y="68" font-size="10" fill="#5b6480">x3 replicas, per Ring</text></g>
    <g><rect x="945" y="30" width="150" height="50" rx="8" fill="#e9f7f3" stroke="#0f7a63" stroke-width="1.4"/>
      <text x="1020" y="52" font-size="13" font-weight="700" fill="#1a2138">Container Server</text>
      <text x="1020" y="68" font-size="10" fill="#5b6480">listing / usage</text></g>
  </g>

  <g font-size="11.3" fill="#5b6480" paint-order="stroke" stroke="#f3f5fb" stroke-width="5" stroke-linejoin="round">
    <text x="215" y="103" text-anchor="middle">request token</text>
    <text x="215" y="148" text-anchor="middle">scoped token</text>
    <text x="330" y="193" text-anchor="middle">PUT .../container/object (streamed)</text>
    <text x="445" y="238" text-anchor="middle">validate token</text>
    <text x="560" y="275" text-anchor="middle">ring lookup -&gt; partition + replica nodes</text>
    <text x="675" y="343" text-anchor="middle">stream PUT x3 (parallel)</text>
    <text x="675" y="388" text-anchor="middle">stored: file + xattrs (per replica ack)</text>
    <text x="560" y="423" text-anchor="middle">wait for quorum (e.g. 2-of-3)</text>
    <text x="675" y="493" text-anchor="middle">update container listing</text>
    <text x="330" y="538" text-anchor="middle">201 Created</text>
    <text x="675" y="583" text-anchor="middle">background: replicate via rsync/HTTP</text>
  </g>

  <g fill="none" stroke="#5b6480" stroke-width="2.2">
    <path d="M100,110 L327,110" marker-end="url(#arH)"/>
    <path d="M330,155 L103,155" marker-end="url(#arH)"/>
    <path d="M100,200 L557,200" marker-end="url(#arH)"/>
    <path d="M560,245 L333,245" stroke-width="1.6" stroke-dasharray="1.5 5" marker-end="url(#arH)"/>
    <path d="M560,282 C620,282 620,312 560,312" marker-end="url(#arH)"/>
    <path d="M560,350 L787,350" marker-end="url(#arH)"/>
    <path d="M790,395 L563,395" marker-end="url(#arH)"/>
    <path d="M560,430 C620,430 620,460 560,460" marker-end="url(#arH)"/>
    <path d="M560,500 L787,500" marker-end="url(#arH)"/>
    <path d="M560,545 L103,545" marker-end="url(#arH)"/>
    <path d="M790,590 L1017,590" stroke-dasharray="9 6" marker-end="url(#arH)"/>
  </g>

  <g font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">
    <g><circle cx="40" cy="110" r="13" fill="#3552c6"/><text x="40" y="114">1</text></g>
    <g><circle cx="40" cy="155" r="13" fill="#3552c6"/><text x="40" y="159">2</text></g>
    <g><circle cx="40" cy="200" r="13" fill="#3552c6"/><text x="40" y="204">3</text></g>
    <g><circle cx="40" cy="245" r="13" fill="#3552c6"/><text x="40" y="249">4</text></g>
    <g><circle cx="40" cy="282" r="13" fill="#3552c6"/><text x="40" y="286">5</text></g>
    <g><circle cx="40" cy="350" r="13" fill="#0f7a63"/><text x="40" y="354">6</text></g>
    <g><circle cx="40" cy="395" r="13" fill="#0f7a63"/><text x="40" y="399">7</text></g>
    <g><circle cx="40" cy="430" r="13" fill="#3552c6"/><text x="40" y="434">8</text></g>
    <g><circle cx="40" cy="500" r="13" fill="#0f7a63"/><text x="40" y="504">9</text></g>
    <g><circle cx="40" cy="545" r="13" fill="#3552c6"/><text x="40" y="549">10</text></g>
    <g><circle cx="40" cy="590" r="13" fill="#0f7a63"/><text x="40" y="594">11</text></g>
  </g>

  <g font-size="11.5" fill="#5b6480">
    <line x1="60" y1="700" x2="100" y2="700" stroke="#5b6480" stroke-width="2.2"/>
    <text x="108" y="704">sync REST / API</text>
    <line x1="300" y1="700" x2="340" y2="700" stroke="#5b6480" stroke-width="1.6" stroke-dasharray="1.5 5"/>
    <text x="348" y="704">token / auth check</text>
    <line x1="540" y1="700" x2="580" y2="700" stroke="#5b6480" stroke-width="2.2" stroke-dasharray="9 6"/>
    <text x="588" y="704">async / background</text>
  </g>
</svg>
