<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 1055" width="1560" height="1055" font-family="Consolas, 'SFMono-Regular', Menlo, monospace">
  <defs>
    <marker id="arH" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6480"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="1558" height="1053" rx="14" fill="#f3f5fb" stroke="#d7dbec" stroke-width="1.5"/>

  <!-- loop A: steady-state traffic serving -->
  <rect x="10" y="105" width="540" height="235" fill="none" stroke="#0f7a63" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="18" y="98" font-size="11" font-weight="700" fill="#0f7a63">loop: steady-state traffic (continuous)</text>

  <!-- loop B: steady-state monitoring -->
  <rect x="200" y="365" width="560" height="140" fill="none" stroke="#a3225a" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="208" y="358" font-size="11" font-weight="700" fill="#a3225a">loop: continuous scrape + rule evaluation</text>

  <g stroke="#c3c9e0" stroke-width="1.3" stroke-dasharray="4 4">
    <line x1="90" y1="82" x2="90" y2="920"/>
    <line x1="280" y1="82" x2="280" y2="920"/>
    <line x1="470" y1="82" x2="470" y2="920"/>
    <line x1="660" y1="82" x2="660" y2="920"/>
    <line x1="850" y1="82" x2="850" y2="920"/>
    <line x1="1040" y1="82" x2="1040" y2="920"/>
    <line x1="1230" y1="82" x2="1230" y2="920"/>
    <line x1="1420" y1="82" x2="1420" y2="920"/>
  </g>

  <g text-anchor="middle">
    <g><rect x="15" y="22" width="150" height="58" rx="8" fill="#eceff8" stroke="#374066" stroke-width="1.4"/>
      <text x="90" y="44" font-size="13" font-weight="700" fill="#1a2138">Client</text>
      <text x="90" y="60" font-size="9.5" fill="#5b6480">external traffic</text>
      <text x="90" y="73" font-size="9.5" fill="#5b6480">(users / other services)</text></g>
    <g><rect x="205" y="22" width="150" height="58" rx="8" fill="#e9f7f3" stroke="#0f7a63" stroke-width="1.4"/>
      <text x="280" y="44" font-size="13" font-weight="700" fill="#1a2138">Octavia LB</text>
      <text x="280" y="60" font-size="9.5" fill="#5b6480">amphora VM</text>
      <text x="280" y="73" font-size="9.5" fill="#5b6480">HAProxy + health monitor</text></g>
    <g><rect x="395" y="22" width="150" height="58" rx="8" fill="#e9f7f3" stroke="#0f7a63" stroke-width="1.4"/>
      <text x="470" y="44" font-size="13" font-weight="700" fill="#1a2138">Instances</text>
      <text x="470" y="60" font-size="9.5" fill="#5b6480">Nova Compute</text>
      <text x="470" y="73" font-size="9.5" fill="#5b6480">existing pool members</text></g>
    <g><rect x="585" y="22" width="150" height="58" rx="8" fill="#fbe9f0" stroke="#a3225a" stroke-width="1.4"/>
      <text x="660" y="44" font-size="13" font-weight="700" fill="#1a2138">Prometheus</text>
      <text x="660" y="60" font-size="9.5" fill="#5b6480">not an OpenStack</text>
      <text x="660" y="73" font-size="9.5" fill="#5b6480">service (external)</text></g>
    <g><rect x="775" y="22" width="150" height="58" rx="8" fill="#fbe9f0" stroke="#a3225a" stroke-width="1.4"/>
      <text x="850" y="44" font-size="13" font-weight="700" fill="#1a2138">Alertmanager</text>
      <text x="850" y="60" font-size="9.5" fill="#5b6480">generic webhook</text>
      <text x="850" y="73" font-size="9.5" fill="#5b6480">receiver</text></g>
    <g><rect x="965" y="22" width="150" height="58" rx="8" fill="#eef1fc" stroke="#3552c6" stroke-width="1.4"/>
      <text x="1040" y="44" font-size="13" font-weight="700" fill="#1a2138">Heat</text>
      <text x="1040" y="60" font-size="9.5" fill="#5b6480">heat-api +</text>
      <text x="1040" y="73" font-size="9.5" fill="#5b6480">heat-engine</text></g>
    <g><rect x="1155" y="22" width="150" height="58" rx="8" fill="#eef1fc" stroke="#3552c6" stroke-width="1.4"/>
      <text x="1230" y="44" font-size="13" font-weight="700" fill="#1a2138">Nova API</text>
      <text x="1230" y="60" font-size="9.5" fill="#5b6480">new ASG member</text>
      <text x="1230" y="73" font-size="9.5" fill="#5b6480">(see Scenario 1)</text></g>
    <g><rect x="1345" y="22" width="150" height="58" rx="8" fill="#eef1fc" stroke="#3552c6" stroke-width="1.4"/>
      <text x="1420" y="44" font-size="13" font-weight="700" fill="#1a2138">Octavia API</text>
      <text x="1420" y="60" font-size="9.5" fill="#5b6480">pool member</text>
      <text x="1420" y="73" font-size="9.5" fill="#5b6480">registration</text></g>
  </g>

  <g font-size="11" fill="#5b6480" paint-order="stroke" stroke="#f3f5fb" stroke-width="5" stroke-linejoin="round">
    <text x="185" y="113" text-anchor="middle">HTTP request -&gt; VIP:port</text>
    <text x="375" y="158" text-anchor="middle">HAProxy forwards (round-robin)</text>
    <text x="375" y="203" text-anchor="middle">response</text>
    <text x="185" y="248" text-anchor="middle">response</text>
    <text x="280" y="288" text-anchor="middle">health monitor: periodic check</text>
    <text x="565" y="373" text-anchor="middle">scrape metrics (node/libvirt exporters)</text>
    <text x="470" y="413" text-anchor="middle">scrape haproxy exporter</text>
    <text x="660" y="453" text-anchor="middle">evaluate alerting rule vs threshold</text>
    <text x="755" y="538" text-anchor="middle">rule fires -&gt; send alert</text>
    <text x="945" y="578" text-anchor="middle">POST webhook -&gt; ScalingPolicy signal_url</text>
    <text x="1040" y="618" text-anchor="middle">execute scale-out: AutoScalingGroup +1</text>
    <text x="1135" y="688" text-anchor="middle">create new ASG member (see Scenario 1)</text>
    <text x="1135" y="728" text-anchor="middle">instance ACTIVE (IP assigned)</text>
    <text x="1230" y="768" text-anchor="middle">create pool member (new IP:port)</text>
    <text x="850" y="808" text-anchor="middle">push updated pool config to amphora</text>
    <text x="280" y="848" text-anchor="middle">health monitor marks member healthy -&gt; in rotation</text>
  </g>

  <g fill="none" stroke="#5b6480" stroke-width="2.2">
    <path d="M90,120 L277,120" marker-end="url(#arH)"/>
    <path d="M280,165 L467,165" marker-end="url(#arH)"/>
    <path d="M470,210 L283,210" marker-end="url(#arH)"/>
    <path d="M280,255 L93,255" marker-end="url(#arH)"/>
    <path d="M280,295 C325,295 325,325 280,325" marker-end="url(#arH)"/>
    <path d="M660,380 L473,380" stroke-dasharray="11 5 2 5" marker-end="url(#arH)"/>
    <path d="M660,420 L283,420" stroke-dasharray="11 5 2 5" marker-end="url(#arH)"/>
    <path d="M660,460 C705,460 705,490 660,490" marker-end="url(#arH)"/>
    <path d="M660,545 L847,545" marker-end="url(#arH)"/>
    <path d="M850,585 L1037,585" marker-end="url(#arH)"/>
    <path d="M1040,625 C1085,625 1085,655 1040,655" marker-end="url(#arH)"/>
    <path d="M1040,695 L1227,695" marker-end="url(#arH)"/>
    <path d="M1230,735 L1043,735" marker-end="url(#arH)"/>
    <path d="M1040,775 L1417,775" marker-end="url(#arH)"/>
    <path d="M1420,815 L283,815" marker-end="url(#arH)"/>
    <path d="M280,855 C325,855 325,885 280,885" marker-end="url(#arH)"/>
  </g>

  <g font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">
    <g><circle cx="40" cy="120" r="13" fill="#3552c6"/><text x="40" y="124">1</text></g>
    <g><circle cx="40" cy="165" r="13" fill="#0f7a63"/><text x="40" y="169">2</text></g>
    <g><circle cx="40" cy="210" r="13" fill="#0f7a63"/><text x="40" y="214">3</text></g>
    <g><circle cx="40" cy="255" r="13" fill="#3552c6"/><text x="40" y="259">4</text></g>
    <g><circle cx="40" cy="295" r="13" fill="#0f7a63"/><text x="40" y="299">5</text></g>
    <g><circle cx="40" cy="380" r="13" fill="#a3225a"/><text x="40" y="384">6</text></g>
    <g><circle cx="40" cy="420" r="13" fill="#a3225a"/><text x="40" y="424">7</text></g>
    <g><circle cx="40" cy="460" r="13" fill="#a3225a"/><text x="40" y="464">8</text></g>
    <g><circle cx="40" cy="545" r="13" fill="#a3225a"/><text x="40" y="549">9</text></g>
    <g><circle cx="40" cy="585" r="13" fill="#a3225a"/><text x="40" y="589">10</text></g>
    <g><circle cx="40" cy="625" r="13" fill="#3552c6"/><text x="40" y="629">11</text></g>
    <g><circle cx="40" cy="695" r="13" fill="#3552c6"/><text x="40" y="699">12</text></g>
    <g><circle cx="40" cy="735" r="13" fill="#3552c6"/><text x="40" y="739">13</text></g>
    <g><circle cx="40" cy="775" r="13" fill="#3552c6"/><text x="40" y="779">14</text></g>
    <g><circle cx="40" cy="815" r="13" fill="#3552c6"/><text x="40" y="819">15</text></g>
    <g><circle cx="40" cy="855" r="13" fill="#0f7a63"/><text x="40" y="859">16</text></g>
  </g>

  <g font-size="11.5" fill="#5b6480">
    <line x1="40" y1="980" x2="80" y2="980" stroke="#5b6480" stroke-width="2.2"/>
    <text x="88" y="984">sync REST / API</text>
    <line x1="260" y1="980" x2="300" y2="980" stroke="#5b6480" stroke-width="2.2" stroke-dasharray="11 5 2 5"/>
    <text x="308" y="984">metrics scrape (Prometheus)</text>
    <text x="600" y="984">Green = data plane (LB/traffic/health)  ·  Rose = monitoring/alerting chain  ·  Blue = orchestration control plane</text>
  </g>
</svg>
