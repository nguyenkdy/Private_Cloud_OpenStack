<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1090 500" width="1090" height="500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="oArH" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1E90D6"/>
    </marker>
    <g id="gear" fill="#1a1a1a">
      <circle r="4.4"/>
      <rect x="-1.1" y="-7.4" width="2.2" height="3.1" transform="rotate(0)"/>
      <rect x="-1.1" y="-7.4" width="2.2" height="3.1" transform="rotate(45)"/>
      <rect x="-1.1" y="-7.4" width="2.2" height="3.1" transform="rotate(90)"/>
      <rect x="-1.1" y="-7.4" width="2.2" height="3.1" transform="rotate(135)"/>
      <rect x="-1.1" y="-7.4" width="2.2" height="3.1" transform="rotate(180)"/>
      <rect x="-1.1" y="-7.4" width="2.2" height="3.1" transform="rotate(225)"/>
      <rect x="-1.1" y="-7.4" width="2.2" height="3.1" transform="rotate(270)"/>
      <rect x="-1.1" y="-7.4" width="2.2" height="3.1" transform="rotate(315)"/>
    </g>
  </defs>

  <rect x="1" y="1" width="1088" height="498" rx="12" fill="#ffffff" stroke="#e3e6ef" stroke-width="1.5"/>

  <!-- connectors (drawn first, under boxes) -->
  <g fill="none" stroke="#1E90D6" stroke-width="2">
    <!-- Amphora Driver (purple) -> Oslo Messaging -->
    <path d="M182,95 L233,95" marker-end="url(#oArH)"/>
    <!-- Oslo Messaging -> Octavia Worker -->
    <path d="M385,95 L428,95" marker-end="url(#oArH)"/>
    <!-- Octavia API -> Driver Agent -->
    <path d="M115,160 L115,208" marker-end="url(#oArH)"/>
    <!-- Oslo Messaging <-> Database (two close arrows) -->
    <path d="M303,140 L303,152" marker-end="url(#oArH)"/>
    <path d="M338,152 L338,140" marker-end="url(#oArH)"/>
    <!-- Driver Agent -> Database -->
    <path d="M200,275 L246,275 L246,205 L268,205" marker-end="url(#oArH)"/>
    <!-- Database <-> Controller Worker Driver -->
    <path d="M372,183 L428,183" marker-end="url(#oArH)"/>
    <path d="M428,197 L372,197" marker-end="url(#oArH)"/>
    <!-- Amphora Driver (blue) -> Certificate Driver -->
    <path d="M572,280 L588,280" marker-end="url(#oArH)"/>
    <!-- Amphora Driver (blue) <-> Amphora (green) -->
    <path d="M470,335 L470,373" marker-end="url(#oArH)"/>
    <path d="M530,373 L530,335" marker-end="url(#oArH)"/>
    <!-- Certificate Driver -> Barbican/Castellan -->
    <path d="M660,335 L660,371" marker-end="url(#oArH)"/>
    <!-- Compute Driver -> Nova -->
    <path d="M820,335 L820,371" marker-end="url(#oArH)"/>
    <!-- Network Driver -> Neutron -->
    <path d="M980,335 L980,371" marker-end="url(#oArH)"/>
  </g>

  <!-- Octavia API (orange) with Amphora Driver (purple) inside -->
  <g>
    <rect x="30" y="30" width="170" height="130" rx="8" fill="#F2A20D" stroke="#C97F00" stroke-width="1.5"/>
    <text x="115" y="52" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Octavia API</text>
    <rect x="48" y="66" width="134" height="42" rx="6" fill="#8B2FC9" stroke="#6B1FA0" stroke-width="1.3"/>
    <text x="115" y="91" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Amphora Driver</text>
    <use href="#gear" transform="translate(185,148)"/>
  </g>

  <!-- Oslo Messaging (pink oval) -->
  <ellipse cx="309" cy="95" rx="76" ry="45" fill="#D0006E" stroke="#A00058" stroke-width="1.5"/>
  <text x="309" y="91" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Oslo</text>
  <text x="309" y="107" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Messaging</text>

  <!-- Database (pink cylinder) -->
  <g>
    <path d="M270,163 a50,13 0 0 1 100,0 v50 a50,13 0 0 1 -100,0 z" fill="#D0006E" stroke="#A00058" stroke-width="1.5"/>
    <ellipse cx="320" cy="163" rx="50" ry="13" fill="#D0006E" stroke="#A00058" stroke-width="1.5"/>
    <text x="320" y="203" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Database</text>
  </g>

  <!-- Driver Agent (orange) -->
  <g>
    <rect x="30" y="210" width="170" height="130" rx="8" fill="#F2A20D" stroke="#C97F00" stroke-width="1.5"/>
    <text x="115" y="280" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Driver Agent</text>
    <use href="#gear" transform="translate(185,328)"/>
  </g>

  <!-- Octavia Worker / Health Manager / Housekeeping Manager (orange row) -->
  <g>
    <rect x="430" y="30" width="170" height="130" rx="8" fill="#F2A20D" stroke="#C97F00" stroke-width="1.5"/>
    <text x="515" y="99" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Octavia</text>
    <text x="515" y="117" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Worker</text>
    <use href="#gear" transform="translate(585,148)"/>
  </g>
  <g>
    <rect x="650" y="30" width="170" height="130" rx="8" fill="#F2A20D" stroke="#C97F00" stroke-width="1.5"/>
    <text x="735" y="99" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Health</text>
    <text x="735" y="117" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Manager</text>
    <use href="#gear" transform="translate(805,148)"/>
  </g>
  <g>
    <rect x="870" y="30" width="170" height="130" rx="8" fill="#F2A20D" stroke="#C97F00" stroke-width="1.5"/>
    <text x="955" y="99" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Housekeeping</text>
    <text x="955" y="117" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Manager</text>
    <use href="#gear" transform="translate(1025,148)"/>
  </g>

  <!-- Controller Worker Driver (blue bar) -->
  <rect x="430" y="163" width="610" height="52" fill="#1E90D6" stroke="#0F6FAE" stroke-width="1.5"/>
  <text x="735" y="194" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Controller Worker Driver</text>

  <!-- Amphora Driver / Certificate Driver / Compute Driver / Network Driver (blue row) -->
  <g>
    <rect x="430" y="225" width="140" height="110" fill="#1E90D6" stroke="#0F6FAE" stroke-width="1.5"/>
    <text x="500" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Amphora</text>
    <text x="500" y="288" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Driver</text>
  </g>
  <g>
    <rect x="590" y="225" width="140" height="110" fill="#1E90D6" stroke="#0F6FAE" stroke-width="1.5"/>
    <text x="660" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Certificate</text>
    <text x="660" y="288" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Driver</text>
  </g>
  <g>
    <rect x="750" y="225" width="140" height="110" fill="#1E90D6" stroke="#0F6FAE" stroke-width="1.5"/>
    <text x="820" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Compute</text>
    <text x="820" y="288" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Driver</text>
  </g>
  <g>
    <rect x="910" y="225" width="140" height="110" fill="#1E90D6" stroke="#0F6FAE" stroke-width="1.5"/>
    <text x="980" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Network</text>
    <text x="980" y="288" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Driver</text>
  </g>

  <!-- Amphora (green layered stack) -->
  <g>
    <path d="M448,435 L448,395 L558,385 L558,425 Z" fill="#2E8B45" stroke="#1F6B33" stroke-width="1.2"/>
    <path d="M440,443 L440,403 L550,393 L550,433 Z" fill="#37A050" stroke="#256B39" stroke-width="1.2"/>
    <path d="M432,451 L432,411 L542,401 L542,441 Z" fill="#43B85E" stroke="#2A7A3E" stroke-width="1.2"/>
    <text x="487" y="429" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Amphora</text>
  </g>

  <!-- Barbican/Castellan, Nova, Neutron (pink ovals) -->
  <ellipse cx="660" cy="415" rx="86" ry="44" fill="#D0006E" stroke="#A00058" stroke-width="1.5"/>
  <text x="660" y="411" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Barbican /</text>
  <text x="660" y="427" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Castellan</text>

  <ellipse cx="820" cy="415" rx="62" ry="44" fill="#D0006E" stroke="#A00058" stroke-width="1.5"/>
  <text x="820" y="420" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Nova</text>

  <ellipse cx="980" cy="415" rx="68" ry="44" fill="#D0006E" stroke="#A00058" stroke-width="1.5"/>
  <text x="980" y="420" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Neutron</text>
</svg>
