<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1150" font-family="Consolas, 'SFMono-Regular', Menlo, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6480"/>
    </marker>
    <pattern id="grid" width="69" height="53" patternUnits="userSpaceOnUse">
      <path d="M 69 0 L 0 0 0 53" fill="none" stroke="#e7eaf5" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- canvas -->
  <rect x="1" y="1" width="1498" height="1148" rx="14" fill="#f3f5fb" stroke="#d7dbec" stroke-width="1.5"/>
  <rect x="1" y="1" width="1498" height="1148" rx="14" fill="url(#grid)"/>

  <!-- ================= connectors (drawn first, under boxes) ================= -->
  <g fill="none" stroke="#5b6480" stroke-width="2.5">
    <!-- A: Clients -> Controller -->
    <path d="M730,110 L730,153" marker-end="url(#arrow)"/>
    <!-- B: RabbitMQ <-> Compute -->
    <path d="M577,555 L577,635 L400,635 L400,648" stroke-dasharray="9 6" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <!-- C: RabbitMQ <-> Storage -->
    <path d="M577,555 L577,635 L1050,635 L1050,648" stroke-dasharray="9 6" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <!-- D: Compute <-> Storage (data plane) -->
    <path d="M722,800 L778,800" stroke-dasharray="1.5 6" stroke-linecap="round" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <!-- E: Compute -> Prometheus -->
    <path d="M470,950 L470,983" stroke-dasharray="11 5 2 5" marker-end="url(#arrow)"/>
    <!-- F: Storage -> Prometheus -->
    <path d="M970,950 L970,965 L620,965 L620,983" stroke-dasharray="11 5 2 5" marker-end="url(#arrow)"/>
    <!-- G: Controller -> Prometheus (left margin loop) -->
    <path d="M100,617 L15,617 L15,1047 L378,1047" stroke-dasharray="11 5 2 5" marker-end="url(#arrow)"/>
    <!-- H: Prometheus -> Grafana -->
    <path d="M712,1047 L788,1047" marker-end="url(#arrow)"/>
    <!-- I: Grafana -> Clients (right margin loop) -->
    <path d="M1000,983 L1000,975 L1485,975 L1485,70 L962,70" marker-end="url(#arrow)"/>
    <!-- J: Keystone -> Memcached -->
    <path d="M290,275 L290,452 L920,452 L920,493" stroke-width="1.4" opacity="0.75" stroke-dasharray="1.5 6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <!-- K: Neutron -> etcd -->
    <path d="M750,360 L750,458 L1263,458 L1263,493" stroke-width="1.4" opacity="0.75" stroke-dasharray="1.5 6" stroke-linecap="round" marker-end="url(#arrow)"/>
  </g>

  <g font-size="13" fill="#5b6480" paint-order="stroke" stroke="#f3f5fb" stroke-width="6" stroke-linejoin="round">
    <text x="742" y="136">HTTPS / REST API</text>
    <text x="586" y="600">AMQP messaging (RabbitMQ task queue)</text>
    <text x="26" y="820" transform="rotate(-90 26 820)">metrics scrape</text>
    <text x="1474" y="820" transform="rotate(-90 1474 820)">dashboards &amp; alerts</text>
  </g>
  <g font-size="11" fill="#5b6480" paint-order="stroke" stroke="#f3f5fb" stroke-width="5" stroke-linejoin="round" text-anchor="middle">
    <text x="640" y="792">iSCSI /</text>
    <text x="640" y="822">image</text>
    <text x="750" y="1038">query</text>
    <text x="590" y="447">token cache</text>
    <text x="1000" y="453">coordination / locking</text>
  </g>

  <!-- ================= Clients ================= -->
  <rect x="500" y="30" width="460" height="80" rx="9" fill="#eceff8" stroke="#374066" stroke-width="1.5"/>
  <text x="730" y="66" text-anchor="middle" font-weight="700" font-size="16" fill="#1a2138">Operators &amp; End Users</text>
  <text x="730" y="86" text-anchor="middle" font-size="11.5" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">CLI · SDK · Horizon Web UI</text>

  <!-- ================= Controller node boundary ================= -->
  <rect x="40" y="155" width="1420" height="460" rx="10" fill="#eef1fc" stroke="#b9c0dd" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="54" y="178" font-weight="700" font-size="15" fill="#5b6480" letter-spacing="1">CONTROLLER NODE</text>

  <!-- controller service chips -->
  <!-- row 1 -->
  <g>
    <rect x="70" y="205" width="440" height="70" rx="7" fill="#ffffff" stroke="#d7dbec"/>
    <rect x="70" y="205" width="4" height="70" fill="#3552c6"/>
    <text x="86" y="223" font-size="9.5" font-weight="700" letter-spacing="1" fill="#3552c6">IDENTITY</text>
    <text x="86" y="243" font-size="15" font-weight="700" fill="#1a2138">Keystone</text>
    <text x="86" y="261" font-size="11" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Auth, roles &amp; endpoint catalog</text>
  </g>
  <g>
    <rect x="530" y="205" width="440" height="70" rx="7" fill="#ffffff" stroke="#d7dbec"/>
    <rect x="530" y="205" width="4" height="70" fill="#3552c6"/>
    <text x="546" y="223" font-size="9.5" font-weight="700" letter-spacing="1" fill="#3552c6">IMAGE</text>
    <text x="546" y="243" font-size="15" font-weight="700" fill="#1a2138">Glance</text>
    <text x="546" y="261" font-size="11" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">VM image registry &amp; retrieval</text>
  </g>
  <g>
    <rect x="990" y="205" width="440" height="70" rx="7" fill="#ffffff" stroke="#d7dbec"/>
    <rect x="990" y="205" width="4" height="70" fill="#3552c6"/>
    <text x="1006" y="223" font-size="9.5" font-weight="700" letter-spacing="1" fill="#3552c6">DASHBOARD</text>
    <text x="1006" y="243" font-size="15" font-weight="700" fill="#1a2138">Horizon</text>
    <text x="1006" y="261" font-size="11" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Web GUI for admins &amp; users</text>
  </g>

  <!-- row 2 -->
  <g>
    <rect x="70" y="290" width="440" height="70" rx="7" fill="#ffffff" stroke="#d7dbec"/>
    <rect x="70" y="290" width="4" height="70" fill="#3552c6"/>
    <text x="86" y="308" font-size="9.5" font-weight="700" letter-spacing="1" fill="#3552c6">COMPUTE</text>
    <text x="86" y="328" font-size="15" font-weight="700" fill="#1a2138">Nova · api / scheduler / conductor</text>
    <text x="86" y="346" font-size="11" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Instance lifecycle &amp; scheduling</text>
  </g>
  <g>
    <rect x="530" y="290" width="440" height="70" rx="7" fill="#ffffff" stroke="#d7dbec"/>
    <rect x="530" y="290" width="4" height="70" fill="#3552c6"/>
    <text x="546" y="308" font-size="9.5" font-weight="700" letter-spacing="1" fill="#3552c6">NETWORK</text>
    <text x="546" y="328" font-size="15" font-weight="700" fill="#1a2138">Neutron · server</text>
    <text x="546" y="346" font-size="11" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Networking-as-a-Service, IPAM</text>
  </g>
  <g>
    <rect x="990" y="290" width="440" height="70" rx="7" fill="#ffffff" stroke="#d7dbec"/>
    <rect x="990" y="290" width="4" height="70" fill="#3552c6"/>
    <text x="1006" y="308" font-size="9.5" font-weight="700" letter-spacing="1" fill="#3552c6">BLOCK STORAGE</text>
    <text x="1006" y="328" font-size="15" font-weight="700" fill="#1a2138">Cinder · api / scheduler</text>
    <text x="1006" y="346" font-size="11" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Persistent volumes for instances</text>
  </g>

  <!-- row 3 -->
  <g>
    <rect x="70" y="375" width="440" height="70" rx="7" fill="#ffffff" stroke="#d7dbec"/>
    <rect x="70" y="375" width="4" height="70" fill="#3552c6"/>
    <text x="86" y="393" font-size="9.5" font-weight="700" letter-spacing="1" fill="#3552c6">OBJECT STORAGE</text>
    <text x="86" y="413" font-size="15" font-weight="700" fill="#1a2138">Swift · proxy</text>
    <text x="86" y="431" font-size="11" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Distributed object storage API</text>
  </g>
  <g>
    <rect x="530" y="375" width="440" height="70" rx="7" fill="#ffffff" stroke="#d7dbec"/>
    <rect x="530" y="375" width="4" height="70" fill="#3552c6"/>
    <text x="546" y="393" font-size="9.5" font-weight="700" letter-spacing="1" fill="#3552c6">ORCHESTRATION</text>
    <text x="546" y="413" font-size="15" font-weight="700" fill="#1a2138">Heat</text>
    <text x="546" y="431" font-size="11" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">IaC templates for stacks</text>
  </g>
  <g>
    <rect x="990" y="375" width="440" height="70" rx="7" fill="#ffffff" stroke="#d7dbec"/>
    <rect x="990" y="375" width="4" height="70" fill="#3552c6"/>
    <text x="1006" y="393" font-size="9.5" font-weight="700" letter-spacing="1" fill="#3552c6">LOAD BALANCING</text>
    <text x="1006" y="413" font-size="15" font-weight="700" fill="#1a2138">Octavia · api</text>
    <text x="1006" y="431" font-size="11" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Traffic distribution across instances</text>
  </g>

  <!-- backend services frame -->
  <rect x="55" y="460" width="1390" height="145" rx="8" fill="none" stroke="#b9c0dd" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="67" y="476" font-weight="700" font-size="13" fill="#5b6480" letter-spacing="1">BACKEND SERVICES</text>

  <g>
    <rect x="70" y="495" width="328" height="60" rx="7" fill="#fbf1e2" stroke="#d7dbec"/>
    <rect x="70" y="495" width="4" height="60" fill="#b5710d"/>
    <text x="86" y="512" font-size="9" font-weight="700" letter-spacing="1" fill="#b5710d">RDBMS</text>
    <text x="86" y="530" font-size="13.5" font-weight="700" fill="#1a2138">MariaDB</text>
    <text x="86" y="546" font-size="10.5" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">State &amp; metadata for every service</text>
  </g>
  <g>
    <rect x="413" y="495" width="328" height="60" rx="7" fill="#fbf1e2" stroke="#d7dbec"/>
    <rect x="413" y="495" width="4" height="60" fill="#b5710d"/>
    <text x="429" y="512" font-size="9" font-weight="700" letter-spacing="1" fill="#b5710d">MESSAGE BROKER</text>
    <text x="429" y="530" font-size="13.5" font-weight="700" fill="#1a2138">RabbitMQ</text>
    <text x="429" y="546" font-size="10.5" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Inter-service AMQP coordination</text>
  </g>
  <g>
    <rect x="756" y="495" width="328" height="60" rx="7" fill="#fbf1e2" stroke="#d7dbec"/>
    <rect x="756" y="495" width="4" height="60" fill="#b5710d"/>
    <text x="772" y="512" font-size="9" font-weight="700" letter-spacing="1" fill="#b5710d">CACHE</text>
    <text x="772" y="530" font-size="13.5" font-weight="700" fill="#1a2138">Memcached</text>
    <text x="772" y="546" font-size="10.5" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Keystone auth-token cache</text>
  </g>
  <g>
    <rect x="1099" y="495" width="328" height="60" rx="7" fill="#fbf1e2" stroke="#d7dbec"/>
    <rect x="1099" y="495" width="4" height="60" fill="#b5710d"/>
    <text x="1115" y="512" font-size="9" font-weight="700" letter-spacing="1" fill="#b5710d">KV STORE</text>
    <text x="1115" y="530" font-size="13.5" font-weight="700" fill="#1a2138">etcd</text>
    <text x="1115" y="546" font-size="10.5" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Sync &amp; distributed locking</text>
  </g>

  <!-- ================= Compute node boundary ================= -->
  <rect x="40" y="650" width="680" height="300" rx="10" fill="#e9f7f3" stroke="#b9c0dd" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="54" y="673" font-weight="700" font-size="15" fill="#5b6480" letter-spacing="1">COMPUTE NODES ×N</text>
  <g>
    <rect x="70" y="695" width="620" height="63" rx="7" fill="#ffffff" stroke="#d7dbec"/>
    <rect x="70" y="695" width="4" height="63" fill="#0f7a63"/>
    <text x="86" y="712" font-size="9.5" font-weight="700" letter-spacing="1" fill="#0f7a63">HYPERVISOR</text>
    <text x="86" y="731" font-size="15" font-weight="700" fill="#1a2138">Nova-compute</text>
    <text x="86" y="748" font-size="11" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">KVM / QEMU via libvirt</text>
  </g>
  <g>
    <rect x="70" y="771" width="620" height="63" rx="7" fill="#ffffff" stroke="#d7dbec"/>
    <rect x="70" y="771" width="4" height="63" fill="#0f7a63"/>
    <text x="86" y="788" font-size="9.5" font-weight="700" letter-spacing="1" fill="#0f7a63">NETWORK AGENT</text>
    <text x="86" y="807" font-size="15" font-weight="700" fill="#1a2138">Neutron L2 agent</text>
    <text x="86" y="824" font-size="11" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Linux Bridge / Open vSwitch</text>
  </g>
  <g>
    <rect x="70" y="847" width="620" height="63" rx="7" fill="#ffffff" stroke="#d7dbec"/>
    <rect x="70" y="847" width="4" height="63" fill="#0f7a63"/>
    <text x="86" y="864" font-size="9.5" font-weight="700" letter-spacing="1" fill="#0f7a63">WORKLOAD</text>
    <text x="86" y="883" font-size="15" font-weight="700" fill="#1a2138">Guest VM instances</text>
    <text x="86" y="900" font-size="11" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Scheduled here by Nova</text>
  </g>

  <!-- ================= Storage node boundary ================= -->
  <rect x="780" y="650" width="680" height="300" rx="10" fill="#e9f7f3" stroke="#b9c0dd" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="794" y="673" font-weight="700" font-size="15" fill="#5b6480" letter-spacing="1">STORAGE NODES ×N</text>
  <g>
    <rect x="810" y="695" width="620" height="63" rx="7" fill="#ffffff" stroke="#d7dbec"/>
    <rect x="810" y="695" width="4" height="63" fill="#0f7a63"/>
    <text x="826" y="712" font-size="9.5" font-weight="700" letter-spacing="1" fill="#0f7a63">BLOCK STORAGE</text>
    <text x="826" y="731" font-size="15" font-weight="700" fill="#1a2138">Cinder-volume</text>
    <text x="826" y="748" font-size="11" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">LVM / iSCSI backend</text>
  </g>
  <g>
    <rect x="810" y="771" width="620" height="63" rx="7" fill="#ffffff" stroke="#d7dbec"/>
    <rect x="810" y="771" width="4" height="63" fill="#0f7a63"/>
    <text x="826" y="788" font-size="9.5" font-weight="700" letter-spacing="1" fill="#0f7a63">OBJECT STORAGE</text>
    <text x="826" y="807" font-size="15" font-weight="700" fill="#1a2138">Swift storage</text>
    <text x="826" y="824" font-size="11" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Account / container / object servers</text>
  </g>
  <g>
    <rect x="810" y="847" width="620" height="63" rx="7" fill="#ffffff" stroke="#d7dbec"/>
    <rect x="810" y="847" width="4" height="63" fill="#0f7a63"/>
    <text x="826" y="864" font-size="9.5" font-weight="700" letter-spacing="1" fill="#0f7a63">IMAGE STORE</text>
    <text x="826" y="883" font-size="15" font-weight="700" fill="#1a2138">Glance backend</text>
    <text x="826" y="900" font-size="11" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Backing store for VM images</text>
  </g>

  <!-- ================= Monitoring ================= -->
  <g>
    <rect x="380" y="985" width="330" height="125" rx="7" fill="#fbe9f0" stroke="#d7dbec"/>
    <rect x="380" y="985" width="4" height="125" fill="#a3225a"/>
    <text x="398" y="1013" font-size="10.5" font-weight="700" letter-spacing="1" fill="#a3225a">METRICS</text>
    <text x="398" y="1039" font-size="18" font-weight="700" fill="#1a2138">Prometheus</text>
    <text x="398" y="1062" font-size="12.5" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Scrapes metrics from all nodes</text>
  </g>
  <g>
    <rect x="790" y="985" width="330" height="125" rx="7" fill="#fbe9f0" stroke="#d7dbec"/>
    <rect x="790" y="985" width="4" height="125" fill="#a3225a"/>
    <text x="808" y="1013" font-size="10.5" font-weight="700" letter-spacing="1" fill="#a3225a">VISUALIZATION</text>
    <text x="808" y="1039" font-size="18" font-weight="700" fill="#1a2138">Grafana</text>
    <text x="808" y="1062" font-size="12.5" fill="#5b6480" font-family="Segoe UI, Arial, sans-serif">Dashboards &amp; alerting on metrics</text>
  </g>
</svg>
