# Source: https://docs.openstack.org/keystone/2026.1/install/keystone-install-ubuntu.html
# OpenStack 2026.1 Installation Guide - Keystone install and configure (Ubuntu)
#
# Destination on controller node: /etc/keystone/keystone.conf
#
# Placeholder values (KEYSTONE_DBPASS) must be replaced with your own secret
# before real use.
#
# Related steps shown in the same guide page that are NOT part of this file:
#   - SQL: CREATE DATABASE keystone; CREATE USER 'keystone'@'localhost'
#     IDENTIFIED BY 'KEYSTONE_DBPASS'; GRANT ALL PRIVILEGES ON keystone.* TO
#     'keystone'@'localhost'; (and again for 'keystone'@'%')
#   - apt install keystone
#   - su -s /bin/sh -c "keystone-manage db_sync" keystone
#   - keystone-manage fernet_setup --keystone-user keystone --keystone-group keystone
#   - keystone-manage credential_setup --keystone-user keystone --keystone-group keystone
#   - keystone-manage bootstrap --bootstrap-password ADMIN_PASS \
#       --bootstrap-admin-url http://controller:5000/v3/ \
#       --bootstrap-internal-url http://controller:5000/v3/ \
#       --bootstrap-public-url http://controller:5000/v3/ \
#       --bootstrap-region-id RegionOne
#   - /etc/apache2/apache2.conf: ServerName controller
#   - service apache2 restart

[database]
connection = mysql+pymysql://keystone:KEYSTONE_DBPASS@controller/keystone

[token]
provider = fernet
