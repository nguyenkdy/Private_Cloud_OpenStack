# Source: https://docs.openstack.org/nova/2026.1/install/controller-install-ubuntu.html
# OpenStack 2026.1 Installation Guide - Nova controller node install (Ubuntu)
#
# Destination on controller node: /etc/nova/nova.conf
#
# Placeholder values (NOVA_DBPASS, RABBIT_PASS, NOVA_PASS, PLACEMENT_PASS,
# 10.0.0.11) must be replaced with your own secrets/values before real use.
# Lines shown as "# ..." in the guide indicate existing default content in
# the section that should be retained.
#
# Related steps shown in the same guide page that are NOT part of this file:
#   - SQL: CREATE DATABASE nova_api; CREATE DATABASE nova; CREATE DATABASE nova_cell0;
#     GRANT ALL PRIVILEGES on each to 'nova'@'localhost' and 'nova'@'%' IDENTIFIED BY 'NOVA_DBPASS'
#   - apt install nova-api nova-conductor nova-novncproxy nova-scheduler
#   - su -s /bin/sh -c "nova-manage api_db sync" nova
#   - su -s /bin/sh -c "nova-manage cell_v2 map_cell0" nova
#   - su -s /bin/sh -c "nova-manage cell_v2 create_cell --name=cell1 --verbose" nova
#   - su -s /bin/sh -c "nova-manage db sync" nova
#   - su -s /bin/sh -c "nova-manage cell_v2 list_cells" nova
#   - service nova-api restart / nova-scheduler restart / nova-conductor restart / nova-novncproxy restart
#
# NOTE: this file also includes [neutron] and [cinder] sections added by the
# Networking and Block Storage install guides later in the overall install
# process (sources noted inline below).

[api_database]
# ...
connection = mysql+pymysql://nova:NOVA_DBPASS@controller/nova_api

[database]
# ...
connection = mysql+pymysql://nova:NOVA_DBPASS@controller/nova

[DEFAULT]
# ...
transport_url = rabbit://openstack:RABBIT_PASS@controller:5672/
my_ip = 10.0.0.11

[keystone_authtoken]
# ...
www_authenticate_uri = http://controller:5000/
auth_url = http://controller:5000/
memcached_servers = controller:11211
auth_type = password
project_domain_name = Default
user_domain_name = Default
project_name = service
username = nova
password = NOVA_PASS

[service_user]
send_service_user_token = true
auth_url = https://controller/identity
auth_type = password
project_domain_name = Default
project_name = service
user_domain_name = Default
username = nova
password = NOVA_PASS

[vnc]
enabled = true
# ...
server_listen = $my_ip
server_proxyclient_address = $my_ip

[glance]
# ...
api_servers = http://controller:9292

[oslo_concurrency]
# ...
lock_path = /var/lib/nova/tmp

[placement]
# ...
region_name = RegionOne
project_domain_name = Default
project_name = service
auth_type = password
user_domain_name = Default
auth_url = http://controller:5000/v3
username = placement
password = PLACEMENT_PASS

# --- Added by the Networking (neutron) install guide ---
# Source: https://docs.openstack.org/neutron/2026.1/install/controller-install-ubuntu.html
[neutron]
# ...
auth_url = http://controller:5000
auth_type = password
project_domain_name = Default
user_domain_name = Default
region_name = RegionOne
project_name = service
username = neutron
password = NEUTRON_PASS
service_metadata_proxy = true
metadata_proxy_shared_secret = METADATA_SECRET

# --- Added by the Block Storage (cinder) install guide ---
# Source: https://docs.openstack.org/cinder/2026.1/install/cinder-controller-install-ubuntu.html
[cinder]
os_region_name = RegionOne
