# Source: https://docs.openstack.org/nova/2026.1/install/compute-install-ubuntu.html
# OpenStack 2026.1 Installation Guide - Nova compute node install (Ubuntu)
#
# Destination on compute node: /etc/nova/nova.conf
#
# Placeholder values (RABBIT_PASS, MANAGEMENT_INTERFACE_IP_ADDRESS, NOVA_PASS,
# PLACEMENT_PASS) must be replaced with your own secrets/values before real use.
# Lines shown as "# ..." in the guide indicate existing default content in
# the section that should be retained.
#
# Related steps shown in the same guide page that are NOT part of this file:
#   - apt install nova-compute
#   - service nova-compute restart
#   - (on the controller) "Add the compute node to the cell database" via
#     nova-manage cell_v2 discover_hosts / list_hosts
#
# NOTE: the Networking (neutron) install guide also adds a [neutron] section
# to this same nova.conf file on both controller and compute nodes - see
# configs/neutron/neutron-controller.conf and configs/neutron/neutron-compute.conf
# for the exact [neutron] section content (sourced from the neutron install docs).

[DEFAULT]
# ...
transport_url = rabbit://openstack:RABBIT_PASS@controller
my_ip = MANAGEMENT_INTERFACE_IP_ADDRESS

[service_user]
send_service_user_token = true
auth_url = https://controller/identity
auth_type = password
project_domain_name = Default
project_name = service
user_domain_name = Default
username = nova
password = NOVA_PASS

[vnc]
# ...
enabled = true
server_listen = 0.0.0.0
server_proxyclient_address = $my_ip
novncproxy_base_url = http://controller:6080/vnc_auto.html

[glance]
# ...
api_servers = http://controller:9292

[oslo_concurrency]
# ...
lock_path = /var/lib/nova/tmp

[placement]
# ...
region_name = RegionOne
project_domain_name = Default
project_name = service
auth_type = password
user_domain_name = Default
auth_url = http://controller:5000/v3
username = placement
password = PLACEMENT_PASS

# --- Added by the Networking (neutron) install guide ---
# Source: https://docs.openstack.org/neutron/2026.1/install/compute-install-ubuntu.html
[neutron]
# ...
auth_url = http://controller:5000
auth_type = password
project_domain_name = Default
user_domain_name = Default
region_name = RegionOne
project_name = service
username = neutron
password = NEUTRON_PASS
