# Source: https://docs.openstack.org/cinder/2026.1/install/cinder-controller-install-ubuntu.html
# OpenStack 2026.1 Installation Guide - Cinder controller node install (Ubuntu)
#
# Destination on controller node: /etc/cinder/cinder.conf
#
# Placeholder values (CINDER_DBPASS, RABBIT_PASS, CINDER_PASS, 10.0.0.11)
# must be replaced with your own secrets/values before real use.
#
# Related steps shown in the same guide page that are NOT part of this file:
#   - SQL: CREATE DATABASE cinder; GRANT ALL PRIVILEGES ON cinder.* TO
#     'cinder'@'localhost' IDENTIFIED BY 'CINDER_DBPASS'; (and again for '%')
#   - apt install cinder-api cinder-scheduler
#   - su -s /bin/sh -c "cinder-manage db sync" cinder
#   - service cinder-scheduler restart
#   - service apache2 restart
#
# This guide also adds a [cinder] section to nova.conf on the controller node:
#   [cinder]
#   os_region_name = RegionOne
# (see configs/nova/nova-controller.conf, appended below in this same guide step)

[database]
connection = mysql+pymysql://cinder:CINDER_DBPASS@controller/cinder

[DEFAULT]
transport_url = rabbit://openstack:RABBIT_PASS@controller
my_ip = 10.0.0.11

[keystone_authtoken]
www_authenticate_uri = http://controller:5000
auth_url = http://controller:5000
memcached_servers = controller:11211
auth_type = password
project_domain_name = default
user_domain_name = default
project_name = service
username = cinder
password = CINDER_PASS

[oslo_concurrency]
lock_path = /var/lib/cinder/tmp
