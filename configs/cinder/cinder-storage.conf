# Source: https://docs.openstack.org/cinder/2026.1/install/cinder-storage-install-ubuntu.html
# OpenStack 2026.1 Installation Guide - Cinder storage node install (Ubuntu)
#
# Destination on storage node: /etc/cinder/cinder.conf
#
# Placeholder values (CINDER_DBPASS, RABBIT_PASS, MANAGEMENT_INTERFACE_IP_ADDRESS,
# CINDER_PASS) must be replaced with your own secrets/values before real use.
#
# Related steps shown in the same guide page that are NOT part of this file:
#   - apt install lvm2 thin-provisioning-tools
#   - pvcreate /dev/sdb
#   - vgcreate cinder-volumes /dev/sdb
#   - Edit /etc/lvm/lvm.conf: devices { ... filter = [ "a/sdb/", "r/.*/" ] }
#   - apt install cinder-volume tgt
#   - Create /etc/tgt/conf.d/cinder.conf containing:
#       include /var/lib/cinder/volumes/*
#   - service tgt restart
#   - service cinder-volume restart

[database]
connection = mysql+pymysql://cinder:CINDER_DBPASS@controller/cinder

[DEFAULT]
transport_url = rabbit://openstack:RABBIT_PASS@controller
my_ip = MANAGEMENT_INTERFACE_IP_ADDRESS
enabled_backends = lvm
glance_api_servers = http://controller:9292

[keystone_authtoken]
www_authenticate_uri = http://controller:5000
auth_url = http://controller:5000
memcached_servers = controller:11211
auth_type = password
project_domain_name = default
user_domain_name = default
project_name = service
username = cinder
password = CINDER_PASS

[lvm]
volume_driver = cinder.volume.drivers.lvm.LVMVolumeDriver
volume_group = cinder-volumes
target_protocol = iscsi
target_helper = tgtadm

[oslo_concurrency]
lock_path = /var/lib/cinder/tmp
