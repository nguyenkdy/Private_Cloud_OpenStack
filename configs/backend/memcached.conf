# Source: https://docs.openstack.org/install-guide/environment-memcached-ubuntu.html
# OpenStack 2026.1 Installation Guide - Memcached for Ubuntu
#
# Destination on controller node: /etc/memcached.conf
#
# The guide instructs editing the existing file to change the listen address
# from 127.0.0.1 to the controller node's management interface IP so other
# nodes can reach it. Replace 10.0.0.11 with your own controller management IP.
#
# Change this line:
#   -l 127.0.0.1
# to:
-l 10.0.0.11
