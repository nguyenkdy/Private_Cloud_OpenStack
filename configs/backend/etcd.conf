# Source: https://docs.openstack.org/install-guide/environment-etcd-ubuntu.html
# OpenStack 2026.1 Installation Guide - Etcd for Ubuntu
#
# Destination on controller node: /etc/default/etcd
# (This is a shell-sourced key=value file, not a YAML/ini file.)
#
# Placeholder values (IP address 10.0.0.11, cluster token) must be replaced
# with your own environment's values before real use.

ETCD_NAME="controller"
ETCD_DATA_DIR="/var/lib/etcd"
ETCD_INITIAL_CLUSTER_STATE="new"
ETCD_INITIAL_CLUSTER_TOKEN="etcd-cluster-01"
ETCD_INITIAL_CLUSTER="controller=http://10.0.0.11:2380"
ETCD_INITIAL_ADVERTISE_PEER_URLS="http://10.0.0.11:2380"
ETCD_ADVERTISE_CLIENT_URLS="http://10.0.0.11:2379"
ETCD_LISTEN_PEER_URLS="http://0.0.0.0:2380"
ETCD_LISTEN_CLIENT_URLS="http://10.0.0.11:2379"
