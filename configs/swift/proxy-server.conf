# Source: https://docs.openstack.org/swift/2026.1/install/controller-install-ubuntu.html
# OpenStack 2026.1 Installation Guide - Swift controller node install (Ubuntu)
#
# Destination on controller node: /etc/swift/proxy-server.conf
# The guide has you download the upstream sample file first, then edit these
# sections:
#   curl -o /etc/swift/proxy-server.conf \
#     https://opendev.org/openstack/swift/raw/branch/master/etc/proxy-server.conf-sample
#
# Placeholder value SWIFT_PASS must be replaced with your own secret before
# real use.
#
# Related steps shown in the same guide page that are NOT part of this file:
#   - openstack user create --domain default --password-prompt swift
#   - openstack role add --project service --user swift admin
#   - openstack service create --name swift --description "OpenStack Object Storage" object-store
#   - openstack endpoint create --region RegionOne object-store public http://controller:8080/v1/AUTH_%(project_id)s
#   - openstack endpoint create --region RegionOne object-store internal http://controller:8080/v1/AUTH_%(project_id)s
#   - openstack endpoint create --region RegionOne object-store admin http://controller:8080/v1
#   - apt-get install swift swift-proxy python-swiftclient python-keystoneclient python-keystonemiddleware memcached

[DEFAULT]
bind_port = 8080
user = swift
swift_dir = /etc/swift

[pipeline:main]
pipeline = catch_errors gatekeeper healthcheck proxy-logging cache container_sync bulk ratelimit authtoken keystoneauth container-quotas account-quotas slo dlo versioned_writes proxy-logging proxy-server

[app:proxy-server]
account_autocreate = True

[filter:keystoneauth]
operator_roles = admin,user

[filter:authtoken]
www_authenticate_uri = http://controller:5000
auth_url = http://controller:5000
memcached_servers = controller:11211
auth_type = password
project_domain_id = default
user_domain_id = default
project_name = service
username = swift
password = SWIFT_PASS
delay_auth_decision = True

[filter:cache]
memcache_servers = controller:11211
