# Source: https://docs.openstack.org/swift/2026.1/install/finalize-installation-ubuntu-debian.html
# OpenStack 2026.1 Installation Guide - Swift finalize installation (Ubuntu/Debian)
#
# Destination on controller node and all storage nodes: /etc/swift/swift.conf
# The guide has you download the upstream sample file first, then edit these
# sections:
#   curl -o /etc/swift/swift.conf \
#     https://opendev.org/openstack/swift/raw/branch/master/etc/swift.conf-sample
#
# Placeholder values HASH_PATH_SUFFIX and HASH_PATH_PREFIX must be replaced
# with unique random secrets before real use (the guide notes these are used
# unaltered throughout the cluster and must be the same on every node).
#
# Related steps shown in the same guide page that are NOT part of this file:
#   - chown -R root:swift /etc/swift
#   - service memcached restart
#   - service swift-proxy restart
#   - swift-init all start (on storage nodes)

[swift-hash]
# ...
swift_hash_path_suffix = HASH_PATH_SUFFIX
swift_hash_path_prefix = HASH_PATH_PREFIX

[storage-policy:0]
# ...
name = Policy-0
default = yes
