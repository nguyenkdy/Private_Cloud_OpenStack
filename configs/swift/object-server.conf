# Source: https://docs.openstack.org/swift/2026.1/install/storage-install-ubuntu-debian.html
# OpenStack 2026.1 Installation Guide - Swift storage node install (Ubuntu/Debian)
#
# Destination on each storage node: /etc/swift/object-server.conf
# The guide has you download the upstream sample file first, then edit these
# sections:
#   curl -o /etc/swift/object-server.conf \
#     https://opendev.org/openstack/swift/raw/branch/master/etc/object-server.conf-sample
#
# Placeholder value MANAGEMENT_INTERFACE_IP_ADDRESS must be replaced with
# your own storage node's management IP before real use.
#
# Related steps shown in the same guide page that are NOT part of this file:
#   - apt-get install xfsprogs rsync
#   - mkfs.xfs /dev/sdb ; mkfs.xfs /dev/sdc
#   - mkdir -p /srv/node/sdb ; mkdir -p /srv/node/sdc
#   - mount the devices under /srv/node/... (per /etc/fstab entries using blkid)
#   - service rsync start
#   - chown -R swift:swift /srv/node
#   - mkdir -p /var/cache/swift ; chown -R root:swift /var/cache/swift ; chmod -R 775 /var/cache/swift
#   - apt-get install swift swift-account swift-container swift-object

[DEFAULT]
bind_ip = MANAGEMENT_INTERFACE_IP_ADDRESS
bind_port = 6200
user = swift
swift_dir = /etc/swift
devices = /srv/node
mount_check = True

[pipeline:main]
pipeline = healthcheck recon object-server

[filter:recon]
use = egg:swift#recon
recon_cache_path = /var/cache/swift
recon_lock_path = /var/lock
