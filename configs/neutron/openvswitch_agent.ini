# Source: https://docs.openstack.org/neutron/2026.1/install/controller-install-option2-ubuntu.html
# and https://docs.openstack.org/neutron/2026.1/install/compute-install-option2-ubuntu.html
# OpenStack 2026.1 Installation Guide - Networking option 2: self-service
# networks, controller and compute node install (Ubuntu)
#
# Destination: /etc/neutron/plugins/ml2/openvswitch_agent.ini
# (used on BOTH the controller node and every compute node in this guide's
# self-service networking example - the guide shows identical content for
# both)
#
# Placeholder values (PROVIDER_BRIDGE_NAME, OVERLAY_INTERFACE_IP_ADDRESS)
# must be replaced with your own environment's values before real use.
# This guide's example uses Open vSwitch rather than Linux Bridge for
# self-service (option 2) networking.

[ovs]
bridge_mappings = provider:PROVIDER_BRIDGE_NAME
local_ip = OVERLAY_INTERFACE_IP_ADDRESS

[agent]
tunnel_types = vxlan
l2_population = true

[securitygroup]
enable_security_group = true
firewall_driver = openvswitch
#firewall_driver = iptables_hybrid
