# Source: https://docs.openstack.org/neutron/2026.1/install/controller-install-option2-ubuntu.html
# OpenStack 2026.1 Installation Guide - Networking option 2: self-service
# networks, controller node install (Ubuntu)
#
# Destination on controller node: /etc/neutron/dhcp_agent.ini
#
# No secret placeholders in this file. The guide shows only the lines below
# being added under [DEFAULT]; the "# ..." marker indicates existing default
# content in the file that should be retained.

[DEFAULT]
# ...
dhcp_driver = neutron.agent.linux.dhcp.Dnsmasq
enable_isolated_metadata = true
