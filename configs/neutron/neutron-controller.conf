# Source: https://docs.openstack.org/neutron/2026.1/install/controller-install-option2-ubuntu.html
# (with the neutron user/service/endpoint creation and metadata_agent.ini
# excerpt from https://docs.openstack.org/neutron/2026.1/install/controller-install-ubuntu.html)
# OpenStack 2026.1 Installation Guide - Networking option 2: self-service
# networks, controller node install (Ubuntu)
#
# Destination on controller node: /etc/neutron/neutron.conf
#
# Placeholder values (NEUTRON_DBPASS, RABBIT_PASS, NEUTRON_PASS, NOVA_PASS)
# must be replaced with your own secrets before real use.
#
# Related steps shown in the same guide pages that are NOT part of this file:
#   - SQL: CREATE DATABASE neutron; GRANT ALL PRIVILEGES ON neutron.* TO
#     'neutron'@'localhost' IDENTIFIED BY 'NEUTRON_DBPASS'; (and again for '%')
#   - openstack user create --domain default --password-prompt neutron
#   - openstack service create --name neutron --description "OpenStack Networking" network
#   - openstack endpoint create --region RegionOne network public http://controller:9696
#   - openstack endpoint create --region RegionOne network internal http://controller:9696
#   - openstack endpoint create --region RegionOne network admin http://controller:9696
#   - su -s /bin/sh -c "neutron-db-manage --config-file /etc/neutron/neutron.conf \
#       --config-file /etc/neutron/plugins/ml2/ml2_conf.ini upgrade head" neutron
#   - service nova-api restart
#   - service neutron-server restart
#   - service neutron-linuxbridge-agent / neutron-openvswitch-agent restart
#   - service neutron-dhcp-agent restart
#   - service neutron-metadata-agent restart
#   - service neutron-l3-agent restart
#
# See also configs/neutron/ml2_conf.ini, openvswitch_agent.ini, dhcp_agent.ini,
# metadata_agent.ini, l3_agent.ini for the other config files shown by the guide,
# and configs/nova/nova-controller.conf for the [neutron] section added there.

[database]
connection = mysql+pymysql://neutron:NEUTRON_DBPASS@controller/neutron

[DEFAULT]
core_plugin = ml2
service_plugins = router
transport_url = rabbit://openstack:RABBIT_PASS@controller
auth_strategy = keystone
notify_nova_on_port_status_changes = true
notify_nova_on_port_data_changes = true

[keystone_authtoken]
www_authenticate_uri = http://controller:5000
auth_url = http://controller:5000
memcached_servers = controller:11211
auth_type = password
project_domain_name = Default
user_domain_name = Default
project_name = service
username = neutron
password = NEUTRON_PASS

[nova]
auth_url = http://controller:5000
auth_type = password
project_domain_name = Default
user_domain_name = Default
region_name = RegionOne
project_name = service
username = nova
password = NOVA_PASS

[oslo_concurrency]
lock_path = /var/lib/neutron/tmp
