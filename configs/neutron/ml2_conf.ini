# Source: https://docs.openstack.org/neutron/2026.1/install/controller-install-option2-ubuntu.html
# OpenStack 2026.1 Installation Guide - Networking option 2: self-service
# networks, controller node install (Ubuntu)
#
# Destination on controller node: /etc/neutron/plugins/ml2/ml2_conf.ini
#
# No secret placeholders in this file. The 2026.1 guide's self-service
# networking example uses the Open vSwitch mechanism driver (not
# linuxbridge) - see configs/neutron/openvswitch_agent.ini.

[ml2]
type_drivers = flat,vlan,vxlan
project_network_types = vxlan
mechanism_drivers = openvswitch,l2population
extension_drivers = port_security

[ml2_type_flat]
flat_networks = provider

[ml2_type_vxlan]
vni_ranges = 1:1000
