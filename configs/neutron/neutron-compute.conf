# Source: https://docs.openstack.org/neutron/2026.1/install/compute-install-ubuntu.html
# and https://docs.openstack.org/neutron/2026.1/install/compute-install-option2-ubuntu.html
# OpenStack 2026.1 Installation Guide - Networking option 2: self-service
# networks, compute node install (Ubuntu)
#
# Destination on compute node: /etc/neutron/neutron.conf
#
# Placeholder value RABBIT_PASS must be replaced with your own secret before
# real use.
#
# Related steps shown in the same guide pages that are NOT part of this file:
#   - apt install neutron-openvswitch-agent
#   - In [database]: comment out any `connection` options (compute nodes
#     don't access the database directly)
#   - service nova-compute restart
#   - service neutron-openvswitch-agent restart
#
# See configs/neutron/openvswitch_agent.ini for the compute node's OVS agent
# config (identical content to the controller node's in this guide), and
# configs/nova/nova-compute.conf for the [neutron] section added there.

[DEFAULT]
# ...
transport_url = rabbit://openstack:RABBIT_PASS@controller

[oslo_concurrency]
# ...
lock_path = /var/lib/neutron/tmp
