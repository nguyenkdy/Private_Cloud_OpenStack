# Source: https://docs.openstack.org/neutron/2026.1/install/controller-install-ubuntu.html
# OpenStack 2026.1 Installation Guide - Neutron controller node install (Ubuntu)
#
# Destination on controller node: /etc/neutron/metadata_agent.ini
#
# Placeholder value METADATA_SECRET must be replaced with your own secret
# before real use, and must match the metadata_proxy_shared_secret value set
# in nova.conf's [neutron] section (see configs/nova/nova-controller.conf).

[DEFAULT]
# ...
nova_metadata_host = controller
metadata_proxy_shared_secret = METADATA_SECRET
