# Source: https://docs.openstack.org/glance/2026.1/install/install-ubuntu.html
# OpenStack 2026.1 Installation Guide - Glance install and configure (Ubuntu)
#
# Destination on controller node: /etc/glance/glance-api.conf
#
# Placeholder values (GLANCE_DBPASS, GLANCE_PASS, ENDPOINT_ID) must be
# replaced with your own secrets/values before real use.
#
# Related steps shown in the same guide page that are NOT part of this file:
#   - SQL: CREATE DATABASE glance; GRANT ALL PRIVILEGES ON glance.* TO
#     'glance'@'localhost' IDENTIFIED BY 'GLANCE_DBPASS'; (and again for '%')
#   - openstack user create --domain default --password-prompt glance
#   - openstack role add --project service --user glance admin
#   - openstack service create --name glance --description "OpenStack Image" image
#   - openstack endpoint create --region RegionOne image public http://controller:9292
#   - openstack endpoint create --region RegionOne image internal http://controller:9292
#   - openstack endpoint create --region RegionOne image admin http://controller:9292
#   - (Optional quota limits via `openstack ... registered limit create`)
#   - apt install glance
#   - su -s /bin/sh -c "glance-manage db_sync" glance
#   - service glance-api restart
#
# No glance-api-paste.ini edits are shown in this guide page - not included.

[database]
connection = mysql+pymysql://glance:GLANCE_DBPASS@controller/glance

[keystone_authtoken]
www_authenticate_uri = http://controller:5000
auth_url = http://controller:5000
memcached_servers = controller:11211
auth_type = password
project_domain_name = Default
user_domain_name = Default
project_name = service
username = glance
password = GLANCE_PASS

[paste_deploy]
flavor = keystone

[DEFAULT]
enabled_backends=fs:file
use_keystone_limits = True

[glance_store]
default_backend = fs

[fs]
filesystem_store_datadir = /var/lib/glance/images/

[oslo_limit]
auth_url = http://controller:5000
auth_type = password
user_domain_id = default
username = glance
system_scope = all
password = GLANCE_PASS
endpoint_id = ENDPOINT_ID
region_name = RegionOne
