# Source: https://docs.openstack.org/heat/2026.1/install/install-ubuntu.html
# OpenStack 2026.1 Installation Guide - Heat install and configure (Ubuntu)
#
# Destination on controller node: /etc/heat/heat.conf
#
# Placeholder values (HEAT_DBPASS, RABBIT_PASS, HEAT_DOMAIN_PASS, HEAT_PASS)
# must be replaced with your own secrets before real use.
#
# Related steps shown in the same guide page that are NOT part of this file:
#   - SQL: CREATE DATABASE heat; GRANT ALL PRIVILEGES ON heat.* TO
#     'heat'@'localhost' IDENTIFIED BY 'HEAT_DBPASS'; (and again for '%')
#   - openstack user create --domain default --password-prompt heat
#   - openstack role add --project service --user heat admin
#   - openstack service create --name heat --description "Orchestration" orchestration
#   - openstack service create --name heat-cfn --description "Orchestration" cloudformation
#   - openstack endpoint create --region RegionOne orchestration public http://controller:8004/v1/%(tenant_id)s
#   - openstack endpoint create --region RegionOne orchestration internal http://controller:8004/v1/%(tenant_id)s
#   - openstack endpoint create --region RegionOne orchestration admin http://controller:8004/v1/%(tenant_id)s
#   - openstack endpoint create --region RegionOne cloudformation public http://controller:8000/v1
#   - openstack endpoint create --region RegionOne cloudformation internal http://controller:8000/v1
#   - openstack endpoint create --region RegionOne cloudformation admin http://controller:8000/v1
#   - openstack domain create --description "Stack projects and users" heat
#   - openstack user create --domain heat --password-prompt heat_domain_admin
#   - openstack role add --domain heat --user-domain heat --user heat_domain_admin admin
#   - openstack role create heat_stack_owner
#   - openstack role add --project demo --user demo heat_stack_owner
#   - openstack role create heat_stack_user
#   - apt-get install heat-api heat-api-cfn heat-engine
#   - su -s /bin/sh -c "heat-manage db_sync" heat
#   - service heat-api restart / heat-api-cfn restart / heat-engine restart

[database]
connection = mysql+pymysql://heat:HEAT_DBPASS@controller/heat

[DEFAULT]
transport_url = rabbit://openstack:RABBIT_PASS@controller
heat_metadata_server_url = http://controller:8000
heat_waitcondition_server_url = http://controller:8000/v1/waitcondition
stack_domain_admin = heat_domain_admin
stack_domain_admin_password = HEAT_DOMAIN_PASS
stack_user_domain_name = heat

[keystone_authtoken]
www_authenticate_uri = http://controller:5000
auth_url = http://controller:5000
memcached_servers = controller:11211
auth_type = password
project_domain_name = Default
user_domain_name = Default
project_name = service
username = heat
password = HEAT_PASS

[ec2authtoken]
auth_url = http://controller:5000
auth_type = password
project_domain_name = Default
user_domain_name = Default
project_name = service
username = heat
password = HEAT_PASS

[trustee]
auth_type = password
auth_url = http://controller:5000
username = heat
password = HEAT_PASS
user_domain_name = Default

[clients_keystone]
auth_uri = http://controller:5000
