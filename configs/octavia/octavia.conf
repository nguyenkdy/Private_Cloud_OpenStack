# Source: https://docs.openstack.org/octavia/2026.1/install/install-ubuntu.html
# OpenStack 2026.1 Installation Guide - Octavia install and configure (Ubuntu)
#
# Destination on controller node: /etc/octavia/octavia.conf
#
# Placeholder values (OCTAVIA_DBPASS, RABBIT_PASS, OCTAVIA_PASS, and the
# certificate passphrases / IDs below) must be replaced with your own
# secrets/values before real use. Values like "<id of service project>",
# "mykey", "<lb-mgmt-sec-grp_id>", "<lb-mgmt-net_id>" are literal placeholders
# from the guide meant to be filled in with real IDs from your environment.
#
# Related steps shown in the same guide page that are NOT part of this file:
#   - SQL: CREATE DATABASE octavia; GRANT ALL PRIVILEGES ON octavia.* TO
#     'octavia'@'localhost' IDENTIFIED BY 'OCTAVIA_DBPASS'; (and again for '%')
#   - apt install octavia-api octavia-health-manager octavia-housekeeping \
#       octavia-worker python3-octavia python3-octaviaclient
#   - octavia-db-manage --config-file /etc/octavia/octavia.conf upgrade head
#   - systemctl restart octavia-api octavia-health-manager octavia-housekeeping octavia-worker
#   - (separate steps in the guide generate the certificates referenced under
#     [certificates] and [haproxy_amphora] below)

[database]
connection = mysql+pymysql://octavia:OCTAVIA_DBPASS@controller/octavia

[DEFAULT]
transport_url = rabbit://openstack:RABBIT_PASS@controller

[oslo_messaging]
topic = octavia_prov

[api_settings]
bind_host = 0.0.0.0
bind_port = 9876

[keystone_authtoken]
www_authenticate_uri = http://controller:5000
auth_url = http://controller:5000
memcached_servers = controller:11211
auth_type = password
project_domain_name = Default
user_domain_name = Default
project_name = service
username = octavia
password = OCTAVIA_PASS

[service_auth]
auth_url = http://controller:5000
memcached_servers = controller:11211
auth_type = password
project_domain_name = Default
user_domain_name = Default
project_name = service
username = octavia
password = OCTAVIA_PASS

[certificates]
server_certs_key_passphrase = insecure-key-do-not-use-this-key
ca_private_key_passphrase = not-secure-passphrase
ca_private_key = /etc/octavia/certs/private/server_ca.key.pem
ca_certificate = /etc/octavia/certs/server_ca.cert.pem

[haproxy_amphora]
server_ca = /etc/octavia/certs/server_ca-chain.cert.pem
client_cert = /etc/octavia/certs/private/client.cert-and-key.pem

[health_manager]
bind_port = 5555
bind_ip = 172.16.0.2
controller_ip_port_list = 172.16.0.2:5555

[controller_worker]
amp_image_owner_id = <id of service project>
amp_image_tag = amphora
amp_ssh_key_name = mykey
amp_secgroup_list = <lb-mgmt-sec-grp_id>
amp_boot_network_list = <lb-mgmt-net_id>
amp_flavor_id = 200
network_driver = allowed_address_pairs_driver
compute_driver = compute_nova_driver
amphora_driver = amphora_haproxy_rest_driver
client_ca = /etc/octavia/certs/client_ca.cert.pem
